name: End-to-End Tests (Main)

on:
  push:
    branches: [main]

jobs:
  e2e-test:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go 1.23.4 manually
        run: |
          curl -LO https://go.dev/dl/go1.23.4.linux-amd64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.23.4.linux-amd64.tar.gz
          echo "export PATH=/usr/local/go/bin:$PATH" >> $HOME/.bashrc
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Verify Go version
        run: go version

      - name: Install Taskfile
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Build
        run: task build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: iscrie-sbom

      - name: Run Maven parser tests
        run: go run ./cmd/test_maven

      # Ajoutez ici d'autres tests de bout en bout si nécessaire, par exemple :
      # - Tests d'intégration avec nexus
      # - Tests de performance 
      # - etc.

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iscrie-binaries
          path: |
            bin/
            iscrie-sbom.spdx.json
