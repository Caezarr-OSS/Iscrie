name: Build and Test (Develop)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go 1.23.4 manually
        run: |
          curl -LO https://go.dev/dl/go1.23.4.linux-amd64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.23.4.linux-amd64.tar.gz
          echo "export PATH=/usr/local/go/bin:$PATH" >> $HOME/.bashrc
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Verify Go version
        run: go version

      - name: Install Task (go-task/task)
        run: |
          sh -c "$(curl -fsSL https://raw.githubusercontent.com/go-task/task/master/install-task.sh)" -- -d
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH=$HOME/.local/bin:$PATH
          task --version

      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run tests
        run: go test ./...

      - name: Build manually if Task fails
        run: |
          if ! $HOME/.local/bin/task build; then
            echo "Falling back to manual build..."
            mkdir -p bin
            go build -o bin/iscrie ./cmd/iscrie
          fi

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: iscrie-sbom

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iscrie-binaries
          path: |
            bin/
            iscrie-sbom.spdx.json
