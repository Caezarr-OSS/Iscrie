name: Release Binaries

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"  # Supporte SemVer + pré-releases comme "-RC1", "-beta"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Go 1.23.4 manually
        run: |
          curl -LO https://go.dev/dl/go1.23.4.linux-amd64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.23.4.linux-amd64.tar.gz
          echo "export PATH=/usr/local/go/bin:$PATH" >> $HOME/.bashrc
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Verify Go version
        run: go version

      - name: Install Task
        uses: arduino/setup-task@v1
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-chglog
        run: |
          go install github.com/git-chglog/git-chglog/cmd/git-chglog@latest

      - name: Generate Changelog
        run: |
          git-chglog -o CHANGELOG.md

      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Build release
        run: |
          task release || {
            echo "Falling back to manual release build..."
            mkdir -p dist
            GOOS=linux GOARCH=amd64 go build -o dist/iscrie-linux-amd64 ./cmd/main.go
            GOOS=darwin GOARCH=amd64 go build -o dist/iscrie-darwin-amd64 ./cmd/main.go
          }

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cd ..

      - name: Generate SBOM
        run: |
          go install github.com/anchore/syft/cmd/syft@latest
          syft . -o cyclonedx-json > dist/sbom.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            dist/*
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
